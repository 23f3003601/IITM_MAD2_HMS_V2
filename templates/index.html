<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body{background:#eef2f7;font-family:'Segoe UI',Tahoma,sans-serif;}
.sidebar{background:linear-gradient(180deg,#1a2f4e 0%,#243b55 100%);min-height:100vh;padding:0;}
.sidebar-brand{color:#fff;font-size:1.05rem;font-weight:700;padding:18px 14px 14px;border-bottom:1px solid rgba(255,255,255,.12);display:block;text-decoration:none;}
.sidebar-brand i{margin-right:8px;color:#4fc3f7;}
.nav-link-side{color:rgba(255,255,255,.8);padding:10px 15px;display:flex;align-items:center;gap:9px;transition:all .2s;font-size:.88rem;text-decoration:none;border-left:3px solid transparent;}
.nav-link-side:hover,.nav-link-side.active{background:rgba(255,255,255,.14);color:#fff;border-left-color:#4fc3f7;}
.nav-link-side i{font-size:.95rem;width:18px;}
.topbar{background:#fff;border-bottom:1px solid #dee2e6;padding:9px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.stat-card{border:none;border-radius:12px;color:#fff;padding:20px 18px;}
.sc-blue{background:linear-gradient(135deg,#1565c0,#1e88e5);}
.sc-green{background:linear-gradient(135deg,#1b5e20,#43a047);}
.sc-orange{background:linear-gradient(135deg,#e65100,#fb8c00);}
.sc-purple{background:linear-gradient(135deg,#4a148c,#8e24aa);}
.stat-card h2{font-size:2.2rem;font-weight:700;margin:4px 0 0;}
.stat-card p{margin:0;opacity:.88;font-size:.85rem;}
.stat-card .si{font-size:2rem;opacity:.65;float:right;margin-top:-30px;}
.card{border:none;border-radius:12px;box-shadow:0 1px 10px rgba(0,0,0,.07);}
.card-header{border-radius:12px 12px 0 0!important;font-weight:600;font-size:.9rem;}
.hms-modal{display:block;background:rgba(0,0,0,.5);position:fixed;top:0;left:0;width:100%;height:100%;z-index:1050;overflow-y:auto;}
.hms-modal .modal-dialog{margin:40px auto;}
.badge-Booked{background:#f59e0b!important;color:#fff!important;}
.badge-Completed{background:#10b981!important;color:#fff!important;}
.badge-Cancelled{background:#ef4444!important;color:#fff!important;}
.toast-box{position:fixed;top:18px;right:18px;z-index:9999;min-width:290px;}
.table th{font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.03em;color:#6c757d;}
.btn-hms{background:#1565c0;color:#fff;border:none;}
.btn-hms:hover{background:#0d47a1;color:#fff;}
.login-wrap{min-height:100vh;background:linear-gradient(135deg,#1a2f4e 0%,#1565c0 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.35);width:100%;max-width:500px;}
.login-header{background:linear-gradient(135deg,#1a2f4e,#1565c0);padding:28px 24px 22px;text-align:center;color:#fff;}
.login-header h3{margin:0;font-weight:700;}
.login-header p{margin:4px 0 0;opacity:.8;font-size:.88rem;}
.doctor-card{transition:transform .2s,box-shadow .2s;}
.doctor-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.12)!important;}
</style>
</head>
<body>
<div id="hms">
  <!-- TOAST -->
  <div v-if="toast.show" class="toast-box">
    <div class="alert alert-success alert-dismissible shadow mb-0 py-2">
      <i class="bi bi-check-circle-fill me-2"></i>{{ toast.msg }}
    </div>
  </div>

  <!-- LOGIN / REGISTER PAGE -->
  <div v-if="!loggedIn" class="login-wrap">
    <div class="login-card">
      <div class="login-header">
        <div class="fs-1 mb-1"><i class="bi bi-hospital-fill"></i></div>
        <h3>Hospital Management System</h3>
        <p>Streamlined healthcare for everyone</p>
      </div>
      <div class="bg-white p-4">
        <ul class="nav nav-tabs mb-3" v-if="tab!=='login' || true">
          <li class="nav-item"><a class="nav-link" :class="{active:tab==='login'}" href="#" @click.prevent="tab='login';authErr=''">Login</a></li>
          <li class="nav-item"><a class="nav-link" :class="{active:tab==='register'}" href="#" @click.prevent="tab='register';authErr=''">Register (Patient)</a></li>
        </ul>
        <div v-if="authErr" class="alert alert-danger py-2 small">{{ authErr }}</div>
        <!-- LOGIN -->
        <form v-if="tab==='login'" @submit.prevent="doLogin">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input class="form-control" v-model="lf.username" required placeholder="Enter username" autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input class="form-control" type="password" v-model="lf.password" required placeholder="Enter password">
          </div>
          <button class="btn btn-hms w-100 py-2" type="submit">
            <i class="bi bi-box-arrow-in-right me-1"></i> Login
          </button>
          <p class="text-center text-muted small mt-3 mb-0">Admin: <strong>admin</strong> / <strong>admin123</strong></p>
        </form>
        <!-- REGISTER -->
        <form v-else @submit.prevent="doRegister">
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label fw-semibold">Username *</label>
              <input class="form-control" v-model="rf.username" required minlength="3" placeholder="Min 3 characters">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Email *</label>
              <input class="form-control" type="email" v-model="rf.email" required placeholder="you@email.com">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Password *</label>
              <input class="form-control" type="password" v-model="rf.password" required minlength="6" placeholder="Min 6 characters">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Phone</label>
              <input class="form-control" v-model="rf.phone" pattern="[0-9]{10}" title="10-digit phone number" placeholder="10 digits">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Date of Birth</label>
              <input class="form-control" type="date" v-model="rf.date_of_birth">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Gender</label>
              <select class="form-select" v-model="rf.gender">
                <option value="">Select</option>
                <option>Male</option><option>Female</option><option>Other</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Blood Group</label>
              <select class="form-select" v-model="rf.blood_group">
                <option value="">Select</option>
                <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Address</label>
              <input class="form-control" v-model="rf.address">
            </div>
            <div class="col-12 mt-2">
              <button class="btn btn-success w-100 py-2" type="submit">
                <i class="bi bi-person-plus me-1"></i> Create Account
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- MAIN APP LAYOUT (after login) -->
  <div v-if="loggedIn" class="d-flex" style="min-height:100vh;">
    <!-- SIDEBAR -->
    <div style="width:220px;flex-shrink:0;" class="sidebar">
      <span class="sidebar-brand"><i class="bi bi-hospital-fill"></i>HMS Portal</span>
      <nav class="mt-1">
        <!-- Admin nav -->
        <template v-if="me.role==='admin'">
          <a href="#" class="nav-link-side" :class="{active:view==='dashboard'}" @click.prevent="go('dashboard')"><i class="bi bi-speedometer2"></i>Dashboard</a>
          <a href="#" class="nav-link-side" :class="{active:view==='doctors'}" @click.prevent="go('doctors')"><i class="bi bi-person-badge"></i>Doctors</a>
          <a href="#" class="nav-link-side" :class="{active:view==='patients'}" @click.prevent="go('patients')"><i class="bi bi-people"></i>Patients</a>
          <a href="#" class="nav-link-side" :class="{active:view==='appointments'}" @click.prevent="go('appointments')"><i class="bi bi-calendar3"></i>Appointments</a>
          <a href="#" class="nav-link-side" :class="{active:view==='departments'}" @click.prevent="go('departments')"><i class="bi bi-building"></i>Departments</a>
        </template>
        <!-- Doctor nav -->
        <template v-if="me.role==='doctor'">
          <a href="#" class="nav-link-side" :class="{active:view==='dashboard'}" @click.prevent="go('dashboard')"><i class="bi bi-speedometer2"></i>Dashboard</a>
          <a href="#" class="nav-link-side" :class="{active:view==='appointments'}" @click.prevent="go('appointments')"><i class="bi bi-calendar3"></i>Appointments</a>
          <a href="#" class="nav-link-side" :class="{active:view==='mypatients'}" @click.prevent="go('mypatients')"><i class="bi bi-people"></i>My Patients</a>
          <a href="#" class="nav-link-side" :class="{active:view==='availability'}" @click.prevent="go('availability')"><i class="bi bi-clock-history"></i>Availability</a>
        </template>
        <!-- Patient nav -->
        <template v-if="me.role==='patient'">
          <a href="#" class="nav-link-side" :class="{active:view==='dashboard'}" @click.prevent="go('dashboard')"><i class="bi bi-speedometer2"></i>Dashboard</a>
          <a href="#" class="nav-link-side" :class="{active:view==='finddoctors'}" @click.prevent="go('finddoctors')"><i class="bi bi-search"></i>Find Doctors</a>
          <a href="#" class="nav-link-side" :class="{active:view==='appointments'}" @click.prevent="go('appointments')"><i class="bi bi-calendar3"></i>My Appointments</a>
          <a href="#" class="nav-link-side" :class="{active:view==='history'}" @click.prevent="go('history')"><i class="bi bi-journal-medical"></i>Treatment History</a>
          <a href="#" class="nav-link-side" :class="{active:view==='payment'}" @click.prevent="go('payment')"><i class="bi bi-credit-card"></i>Payment</a>
          <a href="#" class="nav-link-side" :class="{active:view==='profile'}" @click.prevent="go('profile')"><i class="bi bi-person-circle"></i>My Profile</a>
        </template>
      </nav>
    </div>
    <!-- MAIN CONTENT -->
    <div style="flex:1;overflow-x:hidden;">
      <div class="topbar">
        <div>
          <span class="fw-semibold text-muted small">HOSPITAL MANAGEMENT SYSTEM</span>
        </div>
        <div class="d-flex align-items-center gap-3">
          <span class="badge bg-primary">{{ me.role }}</span>
          <span class="fw-semibold">{{ me.username }}</span>
          <button class="btn btn-sm btn-outline-danger" @click="doLogout"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </div>
      </div>
      <div class="content-area">
        <component :is="activeComp" @toast="showToast" @nav="go" />
      </div>
    </div>
  </div>
</div><!-- end #hms -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const { createApp, ref, computed, onMounted, defineComponent, watch } = Vue;

/* ===== ADMIN DASHBOARD ===== */
const AdminDashboard = defineComponent({ emits:['toast'],
template:`<div>
<h4 class="mb-4 fw-bold"><i class="bi bi-speedometer2 text-primary me-2"></i>Admin Dashboard</h4>
<div class="row g-3 mb-4">
  <div class="col-md-3"><div class="stat-card sc-blue p-3"><i class="bi bi-person-badge si"></i><p>Total Doctors</p><h2>{{s.total_doctors}}</h2></div></div>
  <div class="col-md-3"><div class="stat-card sc-green p-3"><i class="bi bi-people si"></i><p>Total Patients</p><h2>{{s.total_patients}}</h2></div></div>
  <div class="col-md-3"><div class="stat-card sc-orange p-3"><i class="bi bi-calendar-check si"></i><p>Total Appointments</p><h2>{{s.total_appointments}}</h2></div></div>
  <div class="col-md-3"><div class="stat-card sc-purple p-3"><i class="bi bi-clock-history si"></i><p>Upcoming</p><h2>{{s.upcoming_appointments}}</h2></div></div>
</div>
<div class="row g-3 mb-4">
  <div class="col-md-6">
    <div class="card h-100"><div class="card-header bg-primary text-white">Appointments by Status</div>
    <div class="card-body d-flex align-items-center justify-content-center" style="height:220px">
      <canvas ref="chartStatus" style="max-height:200px"></canvas>
    </div></div>
  </div>
  <div class="col-md-6">
    <div class="card h-100"><div class="card-header bg-success text-white">Doctors by Specialization</div>
    <div class="card-body d-flex align-items-center justify-content-center" style="height:220px">
      <canvas ref="chartSpec" style="max-height:200px"></canvas>
    </div></div>
  </div>
</div>
<div class="card"><div class="card-header bg-primary text-white">Recent Appointments</div>
<table class="table table-hover mb-0"><thead class="table-light"><tr><th>Patient</th><th>Doctor</th><th>Date</th><th>Time</th><th>Status</th></tr></thead>
<tbody>
  <tr v-if="recent.length===0"><td colspan="5" class="text-center text-muted py-3">No appointments yet.</td></tr>
  <tr v-for="a in recent" :key="a.id">
    <td>{{a.patient_name}}</td><td>Dr. {{a.doctor_name}}</td><td>{{a.appointment_date}}</td><td>{{a.appointment_time}}</td>
    <td><span class="badge" :class="'badge-'+a.status">{{a.status}}</span></td>
  </tr>
</tbody></table></div></div>`,
setup(_,{emit}){
  const s=ref({total_doctors:0,total_patients:0,total_appointments:0,upcoming_appointments:0});
  const recent=ref([]);
  const chartStatus=ref(null),chartSpec=ref(null);
  onMounted(async()=>{
    const [sr,ar,dr]=await Promise.all([axios.get('/api/dashboard/stats'),axios.get('/api/appointments'),axios.get('/api/doctors')]);
    s.value=sr.data; recent.value=ar.data.slice(0,8);
    // Chart 1: appointments by status
    const statuses={Booked:0,Completed:0,Cancelled:0};
    ar.data.forEach(a=>{if(statuses[a.status]!==undefined)statuses[a.status]++;});
    new Chart(chartStatus.value,{type:'doughnut',data:{labels:Object.keys(statuses),datasets:[{data:Object.values(statuses),backgroundColor:['#f59e0b','#10b981','#ef4444']}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}});
    // Chart 2: doctors by specialization
    const specs={};
    dr.data.forEach(d=>{const sp=d.specialization||'General';specs[sp]=(specs[sp]||0)+1;});
    new Chart(chartSpec.value,{type:'bar',data:{labels:Object.keys(specs),datasets:[{label:'Doctors',data:Object.values(specs),backgroundColor:'#1565c0'}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
  });
  return{s,recent,chartStatus,chartSpec};
}});

/* ===== ADMIN DOCTORS ===== */
const AdminDoctors = defineComponent({ emits:['toast'],
template:`<div>
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="fw-bold mb-0"><i class="bi bi-person-badge text-primary me-2"></i>Doctors</h4>
  <button class="btn btn-hms" @click="open()"><i class="bi bi-plus-circle me-1"></i>Add Doctor</button>
</div>
<div class="row g-2 mb-3">
  <div class="col-md-5"><div class="input-group"><span class="input-group-text"><i class="bi bi-search"></i></span><input class="form-control" v-model="q" @input="search" placeholder="Search by name..."></div></div>
  <div class="col-md-4"><select class="form-select" v-model="specF" @change="search"><option value="">All Specializations</option><option v-for="d in depts" :key="d.id" :value="d.name">{{d.name}}</option></select></div>
</div>
<div class="row g-3">
  <div class="col-md-4" v-for="d in docs" :key="d.id">
    <div class="card doctor-card h-100">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <h5 class="card-title mb-0"><i class="bi bi-person-circle text-primary me-1"></i>Dr. {{d.username}}</h5>
          <span class="badge" :class="d.is_available?'bg-success':'bg-secondary'">{{d.is_available?'Available':'Unavailable'}}</span>
        </div>
        <p class="mb-1 small"><i class="bi bi-building text-muted me-1"></i>{{d.specialization||'General'}}</p>
        <p class="mb-1 small"><i class="bi bi-telephone text-muted me-1"></i>{{d.phone||'N/A'}}</p>
        <p class="mb-1 small text-truncate"><i class="bi bi-envelope text-muted me-1"></i>{{d.email}}</p>
        <p class="mb-0 small text-muted fst-italic">{{d.bio||'Experienced medical professional.'}}</p>
      </div>
      <div class="card-footer bg-transparent d-flex gap-2 flex-wrap">
        <button class="btn btn-sm btn-outline-primary flex-fill" @click="open(d)"><i class="bi bi-pencil"></i> Edit</button>
        <button class="btn btn-sm flex-fill" :class="d.is_blacklisted?'btn-outline-success':'btn-outline-warning'" @click="toggleBlacklist(d)" :title="d.is_blacklisted?'Reinstate':'Blacklist'"><i class="bi" :class="d.is_blacklisted?'bi-check-circle':'bi-slash-circle'"></i> {{d.is_blacklisted?'Reinstate':'Blacklist'}}</button>
        <button class="btn btn-sm btn-outline-danger flex-fill" @click="del(d.id)"><i class="bi bi-trash"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="col-12" v-if="docs.length===0"><div class="alert alert-info">No doctors found.</div></div>
</div>
<div class="hms-modal" v-if="showM">
  <div class="modal-dialog modal-md"><div class="modal-content">
    <div class="modal-header bg-primary text-white"><h5 class="modal-title">{{editing?'Edit':'Add'}} Doctor</h5><button class="btn-close btn-close-white" @click="showM=false"></button></div>
    <div class="modal-body row g-2">
      <div class="col-6"><label class="form-label fw-semibold">Username *</label><input class="form-control" v-model="fm.username" required minlength="3"></div>
      <div class="col-6"><label class="form-label fw-semibold">Email *</label><input class="form-control" type="email" v-model="fm.email" required></div>
      <div class="col-6"><label class="form-label fw-semibold">Phone</label><input class="form-control" v-model="fm.phone" pattern="[0-9]{10}" title="10-digit phone number"></div>
      <div class="col-6"><label class="form-label fw-semibold">Specialization</label>
        <select class="form-select" v-model="fm.specialization_id">
          <option value="">Select dept</option>
          <option v-for="dep in depts" :key="dep.id" :value="dep.id">{{dep.name}}</option>
        </select></div>
      <div class="col-12"><label class="form-label fw-semibold">Bio</label><textarea class="form-control" v-model="fm.bio" rows="2"></textarea></div>
      <div class="col-12"><label class="form-label fw-semibold">{{editing?'New Password (blank=keep)':'Password *'}}</label><input class="form-control" type="password" v-model="fm.password" :required="!editing" minlength="6"></div>
      <div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" v-model="fm.is_available" id="avl"><label class="form-check-label" for="avl">Available for appointments</label></div></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" @click="showM=false">Cancel</button><button class="btn btn-primary" @click="save">Save</button></div>
  </div></div>
</div></div>`,
setup(_,{emit}){
  const docs=ref([]),depts=ref([]),q=ref(''),specF=ref(''),showM=ref(false),editing=ref(null);
  const fm=ref({username:'',email:'',phone:'',bio:'',specialization_id:'',password:'',is_available:true});
  const load=async()=>{const[dr,dp]=await Promise.all([axios.get('/api/doctors'),axios.get('/api/departments')]);docs.value=dr.data;depts.value=dp.data;};
  const search=async()=>{let u='/api/doctors?search='+q.value;if(specF.value)u+='&specialization='+encodeURIComponent(specF.value);const r=await axios.get(u);docs.value=r.data;};
  const open=(d=null)=>{editing.value=d;fm.value=d?{...d,password:''}:{username:'',email:'',phone:'',bio:'',specialization_id:'',password:'',is_available:true};showM.value=true;};
  const save=async()=>{
    try{if(editing.value)await axios.put('/api/doctors/'+editing.value.id,fm.value);else await axios.post('/api/doctors',fm.value);
    showM.value=false;load();emit('toast','Doctor saved successfully.');}catch(e){alert(e.response?.data?.error||'Error');}
  };
  const del=async(id)=>{if(!confirm('Delete this doctor?'))return;await axios.delete('/api/doctors/'+id);load();emit('toast','Doctor deleted.');};
  const toggleBlacklist=async(d)=>{
    const action=d.is_blacklisted?'reinstate':'blacklist';
    if(!confirm(`${action.charAt(0).toUpperCase()+action.slice(1)} Dr. ${d.username}?`))return;
    await axios.post('/api/doctors/'+d.id+'/blacklist',{blacklist:!d.is_blacklisted});
    load();emit('toast',`Doctor ${action}d.`);
  };
  onMounted(load);
  return{docs,depts,q,specF,showM,editing,fm,search,open,save,del,toggleBlacklist};
}});

/* ===== ADMIN PATIENTS ===== */
const AdminPatients = defineComponent({ emits:['toast'],
template:`<div>
<h4 class="fw-bold mb-3"><i class="bi bi-people text-primary me-2"></i>Patients</h4>
<div class="input-group mb-3" style="max-width:400px">
  <span class="input-group-text"><i class="bi bi-search"></i></span>
  <input class="form-control" v-model="q" @input="search" placeholder="Search by name, email, phone, or ID...">
</div>
<div class="card"><div class="card-body p-0">
<table class="table table-hover mb-0">
  <thead class="table-light"><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Gender</th><th>Blood</th><th>Status</th><th>Actions</th></tr></thead>
  <tbody>
    <tr v-if="pts.length===0"><td colspan="8" class="text-center text-muted py-3">No patients found.</td></tr>
    <tr v-for="p in pts" :key="p.id" :class="p.is_blacklisted?'table-danger':''">

</ul>
<div class="card"><div class="card-body p-0">
<table class="table table-hover mb-0">
  <thead class="table-light"><tr><th>ID</th><th>Patient</th><th>Doctor</th><th>Date</th><th>Time</th><th>Reason</th><th>Status</th><th>Update</th></tr></thead>
  <tbody>

    <tr v-for="a in filtered" :key="a.id">
      <td>{{a.id}}</td><td>{{a.patient_name}}</td><td>Dr. {{a.doctor_name}}</td><td>{{a.appointment_date}}</td><td>{{a.appointment_time}}</td><td class="small">{{a.reason||'—'}}</td>

    </tr>
  </tbody>
</table></div></div></div>`,
setup(_,{emit}){
  const all=ref([]),filtered=ref([]),fStatus=ref(''),fTime=ref(''),tab=ref('all');
  const today=new Date().toISOString().split('T')[0];
  const upcomingCount=computed(()=>all.value.filter(a=>a.appointment_date>=today&&a.status==='Booked').length);
  const pastCount=computed(()=>all.value.filter(a=>a.appointment_date<today||a.status!=='Booked').length);
  const load=async()=>{const r=await axios.get('/api/appointments');all.value=r.data;applyFilter();};
  const applyFilter=()=>{
    let res=all.value;
    if(fStatus.value)res=res.filter(a=>a.status===fStatus.value);
    if(fTime.value==='upcoming')res=res.filter(a=>a.appointment_date>=today&&a.status==='Booked');
    if(fTime.value==='past')res=res.filter(a=>a.appointment_date<today||a.status==='Completed'||a.status==='Cancelled');
    filtered.value=res;
  };
  const upd=async(a)=>{await axios.put('/api/appointments/'+a.id,{status:a.status});load();emit('toast','Status updated.');};
  onMounted(load);
  return{all,filtered,fStatus,fTime,tab,today,upcomingCount,pastCount,applyFilter,upd};
}});

  setup(){
    const loggedIn=ref(false),me=ref({username:'',role:'',id:null});
    const view=ref('dashboard'),toast=ref({show:false,msg:''}),tab=ref('login'),authErr=ref('');
    const lf=ref({username:'',password:''});
    const rf=ref({username:'',email:'',phone:'',address:'',date_of_birth:'',gender:'',blood_group:'',password:''});

    const activeComp=computed(()=>{
      const m=COMP_MAP[me.value.role]||{};
      return m[view.value]||m['dashboard']||null;
    });

    const go=(v)=>{ view.value=v; };

    const showToast=(msg)=>{
      toast.value={show:true,msg};
      setTimeout(()=>{toast.value.show=false;},3500);
    };

    const doLogin=async()=>{
      authErr.value='';
      try{
        const r=await axios.post('/api/login',lf.value);
        me.value={...r.data.user, role: r.data.role};
        sessionStorage.setItem('userId',r.data.user.id);
        sessionStorage.setItem('userRole',r.data.role);
        loggedIn.value=true; view.value='dashboard';
      }catch(e){ authErr.value=e.response?.data?.error||'Login failed. Check your credentials.'; }
    };

    const doRegister=async()=>{
      authErr.value='';
      try{
        await axios.post('/api/register',rf.value);
        tab.value='login'; lf.value.username=rf.value.username;
        showToast('Account created! Please login.');
      }catch(e){ authErr.value=e.response?.data?.error||'Registration failed.'; }
    };

    const doLogout=async()=>{
      await axios.post('/api/logout');
      sessionStorage.clear();
      loggedIn.value=false; me.value={username:'',role:'',id:null}; view.value='dashboard';
    };

    onMounted(async()=>{
      try{
        const r=await axios.get('/api/current-user');
        me.value={...r.data.user, role: r.data.role};
        loggedIn.value=true;
      }catch(e){ loggedIn.value=false; }
    });

    return{loggedIn,me,view,toast,tab,authErr,lf,rf,activeComp,go,showToast,doLogin,doRegister,doLogout};
  }
}).mount('#hms');
</script>
</body>
</html>
